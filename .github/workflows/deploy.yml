name: Deploy to EC2

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::008971648169:role/GitHubAction-AssumeRoleWithAction
          aws-region: us-east-1

      - name: Deploy index.html to EC2
        run: |
          CONTENT=$(cat index.html | base64)
          aws ssm send-command \
            --instance-ids "i-086eb6617732da8f3" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"echo $CONTENT | base64 -d | sudo tee /var/www/html/index.html\"]" \
            --output text
